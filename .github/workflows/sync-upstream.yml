name: Sync upstream, rebase, and release

on:
  schedule:
    - cron: '0 4 * * *' # daily at 04:00 UTC
  workflow_dispatch:

jobs:
  sync-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      UPSTREAM_REPO: https://github.com/pymedusa/Medusa.git
      UPSTREAM_BRANCH: master
      FORK_BRANCH: master
      FEATURE_BRANCH: feature/livechart-integration

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.FEATURE_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch origin and upstream
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream "${UPSTREAM_REPO}"
          git fetch --prune origin
          git fetch --prune upstream "${UPSTREAM_BRANCH}"

      - name: Detect upstream changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          upstream_sha="$(git rev-parse "upstream/${UPSTREAM_BRANCH}")"
          origin_sha="$(git rev-parse "origin/${FORK_BRANCH}")"

          echo "upstream_sha=${upstream_sha}" >> "$GITHUB_OUTPUT"
          echo "origin_sha=${origin_sha}" >> "$GITHUB_OUTPUT"

          if [ "${upstream_sha}" = "${origin_sha}" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No upstream changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Upstream changed: ${origin_sha} -> ${upstream_sha}"
          fi

      - name: Skip when no upstream changes
        if: steps.detect.outputs.has_changes != 'true'
        run: echo "Nothing to sync today."

      - name: Sync fork master from upstream
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          git checkout -B "${FORK_BRANCH}" "origin/${FORK_BRANCH}"
          git reset --hard "upstream/${UPSTREAM_BRANCH}"
          git push origin "${FORK_BRANCH}" --force-with-lease

      - name: Rebase feature branch onto updated master
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          git checkout -B "${FEATURE_BRANCH}" "origin/${FEATURE_BRANCH}"
          git rebase "upstream/${UPSTREAM_BRANCH}"
          git push origin "${FEATURE_BRANCH}" --force-with-lease

      - name: Create tag for sync release
        if: steps.detect.outputs.has_changes == 'true'
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          short_sha="${{ steps.detect.outputs.upstream_sha }}"
          short_sha="${short_sha:0:7}"
          date_tag="$(date -u +%Y%m%d)"
          tag="sync-${date_tag}-${short_sha}-${GITHUB_RUN_NUMBER}"

          git tag "${tag}" "${{ steps.detect.outputs.upstream_sha }}"
          git push origin "${tag}"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.detect.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Sync ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ steps.detect.outputs.upstream_sha }}
          generate_release_notes: true
          body: |
            Automated upstream sync.

            - Upstream repo: ${{ env.UPSTREAM_REPO }}
            - Upstream branch: ${{ env.UPSTREAM_BRANCH }}
            - Previous fork master: ${{ steps.detect.outputs.origin_sha }}
            - New upstream master: ${{ steps.detect.outputs.upstream_sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}