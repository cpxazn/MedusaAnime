name: Sync upstream, rebase, and release

on:
  schedule:
    - cron: '0 4 * * *' # daily at 04:00 UTC
  workflow_dispatch:

jobs:
  sync-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      UPSTREAM_REPO: https://github.com/pymedusa/Medusa.git
      UPSTREAM_BRANCH: master
      FEATURE_BRANCH: feature/livechart-integration

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.FEATURE_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch origin and upstream
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream "${UPSTREAM_REPO}"
          git fetch --prune origin
          git fetch --prune upstream "${UPSTREAM_BRANCH}"

      - name: Detect upstream changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          upstream_sha="$(git rev-parse "upstream/${UPSTREAM_BRANCH}")"
          feature_sha="$(git rev-parse "origin/${FEATURE_BRANCH}")"
          merge_base="$(git merge-base "origin/${FEATURE_BRANCH}" "upstream/${UPSTREAM_BRANCH}")"
          upstream_ahead_count="$(git rev-list --count "${merge_base}..upstream/${UPSTREAM_BRANCH}")"

          echo "upstream_sha=${upstream_sha}" >> "$GITHUB_OUTPUT"
          echo "feature_sha=${feature_sha}" >> "$GITHUB_OUTPUT"
          echo "merge_base=${merge_base}" >> "$GITHUB_OUTPUT"
          echo "upstream_ahead_count=${upstream_ahead_count}" >> "$GITHUB_OUTPUT"

          if [ "${upstream_ahead_count}" = "0" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No upstream changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Upstream has ${upstream_ahead_count} new commit(s) since ${merge_base}."
          fi

      - name: Skip when no upstream changes
        if: steps.detect.outputs.has_changes != 'true'
        run: echo "Nothing to sync today."

      - name: Rebase feature branch onto upstream master
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          git checkout -B "${FEATURE_BRANCH}" "origin/${FEATURE_BRANCH}"
          git rebase "upstream/${UPSTREAM_BRANCH}"
          git push origin "${FEATURE_BRANCH}" --force-with-lease

      - name: Set up Node.js 18
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend dependencies
        if: steps.detect.outputs.has_changes == 'true'
        working-directory: ./themes-default/slim
        run: |
          npm install --legacy-peer-deps --ignore-scripts
          npm install ajv@^8 --legacy-peer-deps --ignore-scripts

      - name: Build frontend assets
        if: steps.detect.outputs.has_changes == 'true'
        working-directory: ./themes-default/slim
        run: npm run build

      - name: Create tag for sync release
        if: steps.detect.outputs.has_changes == 'true'
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          short_sha="${{ steps.detect.outputs.upstream_sha }}"
          short_sha="${short_sha:0:7}"
          date_tag="$(date -u +%Y%m%d)"
          tag="sync-${date_tag}-${short_sha}-${GITHUB_RUN_NUMBER}"
          feature_head="$(git rev-parse HEAD)"

          # Ensure the tagged commit contains the workflow files needed by downstream automation.
          git cat-file -e "${feature_head}:.github/workflows/sync-upstream.yml"
          git cat-file -e "${feature_head}:.github/workflows/docker-release.yml"

          git tag "${tag}" "${feature_head}"
          git push origin "${tag}"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "feature_head=${feature_head}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.detect.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Sync ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ steps.tag.outputs.feature_head }}
          generate_release_notes: true
          body: |
            Automated upstream rebase.

            - Upstream repo: ${{ env.UPSTREAM_REPO }}
            - Upstream branch: ${{ env.UPSTREAM_BRANCH }}
            - Feature branch before rebase: ${{ steps.detect.outputs.feature_sha }}
            - Merge base before rebase: ${{ steps.detect.outputs.merge_base }}
            - New upstream master: ${{ steps.detect.outputs.upstream_sha }}
            - Rebases applied from upstream: ${{ steps.detect.outputs.upstream_ahead_count }}
            - Rebases result commit: ${{ steps.tag.outputs.feature_head }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}